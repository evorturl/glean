name: Main Integration

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    if: ${{ secrets.GLEAN_INDEXING_API_TOKEN != '' && secrets.GLEAN_SEARCH_API_TOKEN != '' && secrets.GLEAN_CLIENT_API_TOKEN != '' && (secrets.GLEAN_ALLOWED_USER_EMAILS != '' || secrets.GLEAN_CLIENT_ACT_AS != '') }}
    runs-on: ubuntu-latest
    env:
      GLEAN_INSTANCE: support-lab
      GLEAN_DEFAULT_DATASOURCE: interviewds
      GLEAN_ALLOWED_USER_EMAILS: ${{ secrets.GLEAN_ALLOWED_USER_EMAILS }}
      GLEAN_INDEXING_API_TOKEN: ${{ secrets.GLEAN_INDEXING_API_TOKEN }}
      GLEAN_SEARCH_API_TOKEN: ${{ secrets.GLEAN_SEARCH_API_TOKEN }}
      GLEAN_CLIENT_API_TOKEN: ${{ secrets.GLEAN_CLIENT_API_TOKEN }}
      GLEAN_CLIENT_ACT_AS: ${{ secrets.GLEAN_CLIENT_ACT_AS }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

      - name: Build
        run: npm run build

      - name: Run ingest + ask smoke test
        run: npm run test:e2e -- --datasource interviewds --question "Can I work remotely while attending a conference abroad?"

  integration-skipped:
    if: ${{ !(secrets.GLEAN_INDEXING_API_TOKEN != '' && secrets.GLEAN_SEARCH_API_TOKEN != '' && secrets.GLEAN_CLIENT_API_TOKEN != '' && (secrets.GLEAN_ALLOWED_USER_EMAILS != '' || secrets.GLEAN_CLIENT_ACT_AS != '')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped integration run
        run: echo "Main integration workflow skipped because required Glean secrets are not configured."
